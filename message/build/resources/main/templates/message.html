<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Message</title>
</head>
<body>
    <h1 th:text="#{hello}">Message Test</h1>
    <br>

    <h1 th:text="#{hello.arguse('테스트')}">Message Test</h1>
    <br>

    <h1 th:text="#{hello.arguse(${str})}">Message Test</h1>
    <br>
</body>
</html>
